<!DOCTYPE html>
<html>
<head>
  <title>Smart Toll System</title>

  <!-- OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1609921212029-bb5a28e60960') no-repeat center/cover;
      filter: brightness(0.5);
      z-index: -2;
    }

    .frame {
      width: 600px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      box-shadow: 0 0 25px cyan;
      border: 2px solid cyan;
      text-align: center;
      color: white;
    }

    .top-section {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .camera-box, .upload-box {
      width: 48%;
    }

    video, canvas {
      border: 2px solid cyan;
      border-radius: 10px;
      width: 100%;
    }

    input, select, button {
      width: 90%;
      padding: 10px;
      margin: 6px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: cyan;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="frame">

<h1>🚧 Smart Toll</h1>

<div class="top-section">

  <!-- Camera -->
  <div class="camera-box">
    <video id="video" height="200" autoplay></video>
    <button onclick="capture()">📸 Capture & Scan</button>
    <canvas id="canvas" height="200"></canvas>
  </div>

  <!-- Upload -->
  <div class="upload-box">
    <h3>📤 Upload Plate</h3>
    <input type="file" id="uploadImage" accept="image/*">
    <button onclick="scanUpload()">Scan Image</button>
  </div>

</div>

<h3>Add Vehicle</h3>
<input type="text" id="newNumber" placeholder="Vehicle Number">
<input type="number" id="newBalance" placeholder="Balance">
<button onclick="addVehicle()">Add Vehicle</button>

<h3>Select Vehicle</h3>
<select id="vehicle"></select>

<div id="result"></div>

</div>

<script>
const video = document.getElementById('video');

// Camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(() => alert("Camera access denied"));

// Storage
if (!localStorage.getItem("vehicles")) {
  localStorage.setItem("vehicles", JSON.stringify({}));
}

// Load vehicles
function loadVehicles() {
  let vehicles = JSON.parse(localStorage.getItem("vehicles"));
  let dropdown = document.getElementById("vehicle");
  dropdown.innerHTML = "";

  for (let number in vehicles) {
    let option = document.createElement("option");
    option.value = number;
    option.text = number + " (₹" + vehicles[number] + ")";
    dropdown.appendChild(option);
  }
}

// Add vehicle
function addVehicle() {
  let number = document.getElementById("newNumber").value.toUpperCase();
  let balance = parseInt(document.getElementById("newBalance").value);

  if (!number || isNaN(balance)) {
    alert("Enter valid details");
    return;
  }

  let vehicles = JSON.parse(localStorage.getItem("vehicles"));
  vehicles[number] = balance;

  localStorage.setItem("vehicles", JSON.stringify(vehicles));
  loadVehicles();
}

// 📸 CAMERA OCR
function capture() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  document.getElementById("result").innerHTML = "🔍 Scanning...";

  Tesseract.recognize(canvas, 'eng')
  .then(({ data: { text } }) => {
    let plate = text.toUpperCase().replace(/[^A-Z0-9]/g, '');

    if (!plate) {
      document.getElementById("result").innerHTML = "❌ No plate detected";
      return;
    }

    document.getElementById("result").innerHTML = `🚗 Detected: ${plate}`;
    processToll(plate);
  });
}

// 📤 UPLOAD OCR
function scanUpload() {
  let file = document.getElementById("uploadImage").files[0];

  if (!file) {
    alert("Upload image first");
    return;
  }

  document.getElementById("result").innerHTML = "🔍 Scanning image...";

  Tesseract.recognize(file, 'eng')
  .then(({ data: { text } }) => {
    let plate = text.toUpperCase().replace(/[^A-Z0-9]/g, '');

    if (!plate) {
      document.getElementById("result").innerHTML = "❌ No plate detected";
      return;
    }

    document.getElementById("result").innerHTML = `🚗 Detected: ${plate}`;
    processToll(plate);
  });
}

// 🚀 AUTO FUND TOLL SYSTEM
function processToll(vehicle) {
  let vehicles = JSON.parse(localStorage.getItem("vehicles"));
  const TOLL = 100;
  const AUTO_RECHARGE = 500;

  if (!vehicles[vehicle]) {
    document.getElementById("result").innerHTML = `❌ Vehicle not found`;
    return;
  }

  // 🔥 Auto recharge if low balance
  if (vehicles[vehicle] < TOLL) {
    vehicles[vehicle] += AUTO_RECHARGE;

    document.getElementById("result").innerHTML +=
      `<br>💳 Auto Recharge +₹${AUTO_RECHARGE}`;
  }

  // Deduct toll
  vehicles[vehicle] -= TOLL;

  localStorage.setItem("vehicles", JSON.stringify(vehicles));

  document.getElementById("result").innerHTML +=
    `<br>🚧 Gate Open<br>💰 Balance: ₹${vehicles[vehicle]}`;

  loadVehicles();
}

loadVehicles();
</script>

</body>
</html>
